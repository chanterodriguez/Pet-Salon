<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Student</title>

</head>
<body class="p-4">
    <h1 class="mb-3">Student Registration</h1>

<!-- Registration Form-->
<form class="p-5 border m-5 rounded bg-light">

    <div class="mb-3">
        <label class="form-label">Name</label>
        <input class="form-control" type="text" name="" placeholder="Kimmy Schmitz" id="studentName">
    </div>

    <div class="mb-3">
        <label class="form-label">Age</label>
        <input class="form-control" type="number" name="" placeholder="23" id="studentAge">
    </div>

    <div class="mb-3">
        <label class="form-label">Category</label>
            <select class="form-select" name="" id="studentCourse">
                <option value="">Select a Category</option>
                <option value="Math">Math</option>
                <option value="Spanish">Spanish</option>
            </select>
    </div>

    <div class="d-flex justify-content-end gap-3">
        <button onclick="registerStudent()" class="btn btn-primary" type="submit">Submit</button>
        <button class="btn btn-secondary" type="reset">Reset</button>
    </div>
</form>

<!-- Table-->
<section class="m-5">

    <h1>Student List</h1>
<table class="table">
    <!-- Headers -->
    <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Course</th>
        <th>Delete</th>
    </tr>

    <!-- Body -->
    <tbody id="body">
   




    </tbody>

</table>


</section>



<script src="scripts/104-students.js "> </script>



</body>
</html>
