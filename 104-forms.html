<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Forms</title>
</head>
<body class="mb-3">
    <h1 class="mb-3">Forms</h1>
    <ol>
        <li>Styling the Form with Bootstrap</li>
        <li>Retrieve information usining the Form</li>
        <li>Create objects with a constructor</li>
    </ol>

<!-- Create the Form-->
 <h2 class="mb-3">Product Registration</h2>
 <form class="p-5 border m-5 rounded bg-light">

    <div class="mb-3">
        <label class="form-label">Name</label>
        <input class="form-control" type="text" name="" id="productName" placeholder="Banana">
    </div>

    <div class="mb-3">
        <label class="form-label">Price</label>
        <input class="form-control" type="number" id="productPrice" placeholder="8.99">
    </div>

    <div class="mb-3">
        <label class="form-label">Category</label>
        <select class="form-select" type="number" id="productCategory">
                <option value="">Select a category</option>
                <option value="fruit">Fruit</option>
                <option value="electronics">Electronics</option>
        </select>
    </div>

<div class="d-flex justify-content-end gap-3">
    <button onclick="registerProduct(event)" class="btn btn-primary" type="submit">Submit</button>
    <button class="btn btn-secondary" type="reset">Reset</button>

</div>

</form>

<!--Producs Container-->
<div id="productList">
    
</div>


<script src="scripts/104-forms.js"></script>
</body>
</html>
