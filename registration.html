  <nav>

<div class="page">
 
    <div class="page-heading">
      <p class="page-eyebrow">Client Intake</p>
      <h1 class="page-title">Registration</h1>
    </div>
 
    <div id="pets-display"></div>



    <!-- Create the Form-->
 <h2 class="mb-3">Product Registration</h2>
 <form class="p-5 border m-5 rounded bg-light">

    <div class="mb-3">
        <label class="form-label">Name</label>
        <input class="form-control" type="text" name="" id="productName" placeholder="Rusty">
    </div>

    <div class="mb-3">
        <label class="form-label">Age</label>
        <input class="form-control" type="number" id="productPrice" placeholder="12">
    </div>

    <div class="mb-3">
        <label class="form-label">Breed</label>
        <input class="form-control" type="text" name="" id="productName" placeholder="Yorki">
    </div>

    <div class="mb-3">
        <label class="form-label">Gender</label>
        <select class="form-select" type="number" id="productCategory">
                <option value="">Select Gender</option>
                <option value="female">Female</option>
                <option value="male">Male</option>
        </select>
    </div>

        <div class="mb-3">
        <label class="form-label">Service</label>
        <select class="form-select" type="number" id="productCategory">
                <option value="">Select Service</option>
                <option value="Grooming">Grooming</option>
                <option value="Bathing">Bathing</option>
        </select>
    </div>

<div class="d-flex justify-content-end gap-3">
    <button onclick="registerProduct(event)" class="btn btn-primary" type="submit">Submit</button>
    <button class="btn btn-secondary" type="reset">Reset</button>

</div>

</form>

<!--Producs Container-->
<div id="productList">
    
</div>

    
 
  <script src="scripts/registration.js"></script>
