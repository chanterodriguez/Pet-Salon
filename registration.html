  <nav class="navbar navbar-expand-lg bg-body-tertiary">

<div class="page">
 
    <div class="page-heading">
      <p class="page-eyebrow">Client Intake</p>
      <h1 class="page-title">Registration</h1>
    </div>
 
    <div id="pets-display"></div>

    <!-- Create the Form-->
 <h2 class="mb-3">Pet Registration</h2>
 <form class="p-5 border m-1 rounded bg-light">

    <div class="mb-3">
        <label class="form-label">Name</label>
        <input class="form-control" type="text" name="" placeholder="Rusty" id="petName">
    </div>

    <div class="mb-3">
        <label class="form-label">Age</label>
        <input class="form-control" type="number" placeholder="12" id="petAge" >
    </div>

    <div class="mb-3">
        <label class="form-label">Breed</label>
        <input class="form-control" type="text" name="" id="petBreed" >
    </div>

    <div class="mb-3">
        <label class="form-label">Gender</label>
        <select class="form-select" type="number" placeholder="Yorki" id="petGender">
                <option value="">Select Gender</option>
                <option value="Female">Female</option>
                <option value="Male">Male</option>
        </select>
    </div>

        <div class="mb-3">
        <label class="form-label">Service</label>
        <select class="form-select" type="number" id="petService">
                <option value="">Select Service</option>
                <option value="Grooming">Grooming</option>
                <option value="Bathing">Bathing</option>
        </select>
    </div>

<div class="d-flex justify-content-end gap-3">
    <button onclick="registerPet()" class="btn btn-primary" type="submit">Submit</button>
    <button class="btn btn-secondary" type="reset">Reset</button>

</div>

</form>


<!-- Table-->
<section class="m-3">

    <h2 class="mb-3">Pet List</h2>
<table class="table p-5 border mb-1 rounded table-light  ">
    
    <!-- Headers -->
    <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Breed</th>
        <th>Gender</th>
        <th>Service</th>
        <th>Delete</th>
    </tr>

    <!-- Body -->
    <tbody class="table-group-divider" id="body">
        <tr>
            <td>Rusty</td>
            <td>12</td>
            <td>Mixed</td>
            <td>Male</td>
            <td>Grooming</td>
            <td> <button class="btn btn-danger"> Delete </button> </td>
        </tr>

    </tbody>

</table>
</section>

<script src="scripts/registration.js"></script>
</body>
