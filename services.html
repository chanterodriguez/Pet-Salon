      <button id="changeModeButton" class="btn btn-dark"> 🌙 Change Mode</button>
    </div>
    
 </div>

<!-- Create the Form-->
 
 <form class="p-5 border m-5 rounded" id="servicesForm">

    <div class="mb-3">
        <label class="form-label">Service</label>
        <input class="form-control" type="text" name="" placeholder="Basic Bath" id="serviceName">
    </div>

    <div class="mb-4">
        <label class="form-label">Description</label>
        <input class="form-control" type="text"  placeholder="Include Shampoo and Towel Dry"  id="serviceDescription">
    </div>

    <div class="mb-3">
        <label class="form-label">Price</label>
        <input class="form-control" type="number" placeholder="8.99" step="any" id="servicePrice">
    </div>

    
    <div class="id-flex justify-content-end gap-3">
      <button class="btn btn-primary" type="submit" id="addCSSButton" >Register</button>
      <button class="btn btn-secondary" type="reset">Reset</button>

</div>

</form>
